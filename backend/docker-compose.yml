version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mediafetch_postgres
    environment:
      POSTGRES_USER: mediafetch
      POSTGRES_PASSWORD: mediafetch123
      POSTGRES_DB: mediafetch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: